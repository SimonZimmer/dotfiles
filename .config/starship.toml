add_newline = false
format = '$directory$git_branch$git_status$character'

right_format = "$azure$cmd_duration$time$battery$kubernetes"

[git_status]
format = '([\[$all_status$ahead_behind\]]($style) )'
style = 'red bold'

[azure]
disabled = false
format = '[$symbol($subscription)]($style) '
symbol = '󰠅 '
style = 'blue bold'

[kubernetes]
format = '[⎈ ($context)]($style) '
disabled = false

[line_break]
disabled = true

[git_branch]
format = '[$symbol$branch(:$remote_branch)]($style) '

[terraform]
disabled = true
